services:
  postgres:
    image: postgres:17-alpine
    container_name: loom-postgres
    command: ["postgres", "-c", "max_connections=500"]
    environment:
      POSTGRES_DB: loom_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
